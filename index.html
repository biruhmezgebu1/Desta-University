const Badge=({text,color=C.blue})=><span style={{background:color,color:C.white,padding:"2px 10px",borderRadius:3,fontSize:12,fontWeight:600,letterSpacing:.5,whiteSpace:"nowrap"}}>{text}</span>;
const PBar=({current,total})=><div style={{background:C.grayLt,borderRadius:4,height:6,width:"100%",marginTop:8}}><div style={{background:C.bronze,borderRadius:4,height:6,width:`${Math.min(current/total*100,100)}%`,transition:"width .4s"}}/></div>;
const Score=({score,total,pass})=>{const p=Math.round(score/total*100),ok=p>=pass;return(

if(ex===1)return(<div>

/* ========== M3: Resume Conversion ========== */
function M3({onComplete}){
const[ex,setEx]=useState(0);const[ans,setAns]=useState({});const[fb,setFb]=useState({});
const[ma,setMa]=useState({});const[mfb,setMfb]=useState({});const[s1,setS1]=useState(null);const[s2,setS2]=useState(null);
const chk=(i)=>{const item=RESUME_ITEMS[i];const ok=(ans[i]==="ok"&&item.ok)||(ans[i]==="notok"&&!item.ok);setFb(p=>({...p,[i]:{ok,explain:item.explain}}))};
const score1=()=>{let c=0;RESUME_ITEMS.forEach((r,i)=>{if(fb[i]&&fb[i].ok)c++});setS1(c);setEx(1);window.scrollTo(0,0)};
const chkM=(i)=>{setMfb(p=>({...p,[i]:true}))};
const score2=()=>{let c=0;RESUME_MISTAKES.forEach((r,i)=>{if(mfb[i])c++});setS2(c);setEx(2);window.scrollTo(0,0)};
const ts=(s1||0)+(s2||0),tp=17;

if(ex===0)return(<div>

<span style={{fontSize:11,background:C.blueLt,padding:"2px 8px",borderRadius:3,color:C.blue}}>Reference</span></div>
<span>{refProfile.cred}</span> \u2014 <strong>{refProfile.states}</strong>
{refProfile.flag&&<div style={{marginTop:4,color:C.orange,fontSize:11}}><strong>Flag:</strong> {refProfile.flag}</div>}
</div>)}
{step.type==="info"&&(<Card style={{borderLeft:"4px solid "+C.blue,background:C.blueLt}}>
<div style={{fontSize:14,lineHeight:1.7,marginBottom:step.profile?16:0}}>{step.content}</div>
{step.profile&&(<div style={{background:C.white,borderRadius:8,padding:16,border:"1px solid "+C.grayLt}}>
<div style={{fontWeight:700,fontSize:18,marginBottom:8}}>{step.profile.name}</div>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,fontSize:13}}>
<div><span style={{color:C.gray}}>Credential:</span> <strong>{step.profile.cred}</strong></div>
<div><span style={{color:C.gray}}>License:</span> <strong>{step.profile.states}</strong></div>
<div style={{gridColumn:"1 / -1"}}><span style={{color:C.gray}}>Experience:</span> {step.profile.exp}</div>
<div><span style={{color:C.gray}}>Preference:</span> {step.profile.pref}</div>
<div><span style={{color:C.gray}}>Salary:</span> {step.profile.salary}</div>
{step.profile.flag&&<div style={{gridColumn:"1 / -1",background:C.orangeLt,padding:8,borderRadius:4,border:"1px solid "+C.orange}}><strong style={{color:C.orange}}>Flag:</strong> {step.profile.flag}</div>}
</div></div>)}</Card>)}
{step.type==="choice"&&(<Card>
<div style={{fontWeight:600,fontSize:15,marginBottom:12,lineHeight:1.5}}>{step.prompt}</div>
<div style={{display:"flex",flexDirection:"column",gap:8}}>{step.options.map(function(opt){
var sel=answers[k]===opt;var f=fb[k];var isCorrect=f&&opt===step.answer;var isWrong=f&&sel&&!f.ok;
return <button key={opt} onClick={function(){if(!f){var n=Object.assign({},answers);n[k]=opt;setAnswers(n)}}} disabled={!!f}
style={{padding:"12px 16px",borderRadius:8,fontSize:14,textAlign:"left",lineHeight:1.5,
background:isCorrect?C.greenLt:isWrong?C.redLt:sel?C.blueLt:"transparent",
border:"1px solid "+(isCorrect?C.green:isWrong?C.red:sel?C.blue:C.grayLt)}}>
{opt}{isCorrect?" \u2713":""}{isWrong?" \u2717":""}</button>})}</div>
{answers[k]&&!fb[k]&&<div style={{marginTop:10,textAlign:"right"}}><Btn variant="outline" onClick={chkChoice} style={{fontSize:13,padding:"8px 16px"}}>Check</Btn></div>}
{fb[k]&&<div style={{marginTop:12,padding:12,borderRadius:8,background:fb[k].ok?C.greenLt:C.redLt,fontSize:13,lineHeight:1.6}}><strong>{fb[k].ok?"\u2713 Correct":"\u2717 Incorrect"}</strong><br/>{fb[k].why}</div>}
</Card>)}
{step.type==="text"&&(<Card>
<div style={{fontWeight:600,fontSize:15,marginBottom:8,lineHeight:1.5}}>{step.prompt}</div>
{step.hint&&<div style={{fontSize:12,color:C.gray,marginBottom:12}}>{step.hint}</div>}
<textarea value={textInputs[k]||""} onChange={function(e){var n=Object.assign({},textInputs);n[k]=e.target.value;setTI(n)}} disabled={!!fb[k]} rows={4} placeholder="Type your answer..."
style={{width:"100%",padding:12,borderRadius:6,border:"1px solid "+C.grayLt,fontSize:14,resize:"vertical",fontFamily:"inherit"}}/>
{textInputs[k]&&!fb[k]&&<div style={{marginTop:10,textAlign:"right"}}><Btn variant="outline" onClick={chkText} style={{fontSize:13,padding:"8px 16px"}}>Check</Btn></div>}
{fb[k]&&<div style={{marginTop:12,padding:12,borderRadius:8,background:fb[k].ok?C.greenLt:C.redLt,fontSize:13}}>{fb[k].ok?step.feedback_good:step.feedback_bad}</div>}
</Card>)}
{step.type==="triage"&&(<div>
<Card style={{borderLeft:"4px solid "+C.purple,background:C.purpleLt}}><div style={{fontWeight:600,fontSize:15}}>{step.prompt}</div></Card>
{step.candidates.map(function(c,ci){var tk=scIdx+"-"+ci;var f=triageFb[tk];
return <Card key={ci} style={{borderLeft:"4px solid "+(f?(f.ok?C.green:C.red):C.grayLt)}}>
<div style={{fontWeight:700,fontSize:15,marginBottom:4}}>{c.name}</div>
<div style={{fontSize:13,color:C.gray,marginBottom:10,lineHeight:1.5}}>{c.situation}</div>
<div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{c.options.map(function(opt){
var sel=triageAnswers[tk]===opt;var isCorrect=f&&opt===c.answer;var isWrong=f&&sel&&!f.ok;
return <button key={opt} onClick={function(){if(!f){var n=Object.assign({},triageAnswers);n[tk]=opt;setTA(n)}}} disabled={!!f}
style={{padding:"8px 14px",borderRadius:6,fontSize:12,fontWeight:600,
background:isCorrect?C.greenLt:isWrong?C.redLt:sel?C.blueLt:"transparent",
color:isCorrect?C.green:isWrong?C.red:sel?C.blue:C.gray,
border:"1px solid "+(isCorrect?C.green:isWrong?C.red:sel?C.blue:C.grayLt)}}>{opt}{isCorrect?" \u2713":""}{isWrong?" \u2717":""}</button>})}</div>
{triageAnswers[tk]&&!f&&<div style={{marginTop:8,textAlign:"right"}}><Btn variant="outline" onClick={function(){chkTriage(ci)}} style={{fontSize:11,padding:"5px 12px"}}>Check</Btn></div>}
{f&&<div style={{marginTop:8,fontSize:12,color:f.ok?C.green:C.red}}>{f.ok?"\u2713 Correct":"\u2717 Correct: "+f.answer} \u2014 {f.why}</div>}
</Card>})}</div>)}
<div style={{marginTop:20,display:"flex",justifyContent:"space-between"}}>
<div>{stepIdx>0&&<Btn variant="outline" onClick={goBack} style={{fontSize:13,padding:"8px 16px"}}>{"\u2190"} Back</Btn>}</div>
<div>{canAdvance&&<Btn onClick={advance}>{stepIdx<scenario.steps.length-1?"Next Step \u2192":(scIdx<SIM_SCENARIOS.length-1?"Next Scenario \u2192":"See Results \u2192")}</Btn>}</div>
</div></div>);
}

/* ========== INTRO ========== */
function Intro({onDone}){
const[scene,setScene]=useState(0);
const[out,setOut]=useState(false);

React.useEffect(function(){
if(scene<4){var t=setTimeout(function(){setScene(function(s){return s+1})},2200);return function(){clearTimeout(t)}}
},[scene]);

var finish=function(){setOut(true);setTimeout(onDone,600)};

var slides=[
{img:"slide1.png",text:"From Addis Ababa...",pos:"center center",size:"cover",bg:"#0a0a1a"},
{img:"slide2.png",text:"...through the training...",pos:"center center",size:"cover",bg:"#0a0a1a"},
{img:"slide3.png",text:"...to certification...",pos:"center center",size:"contain",bg:"#e8ddd0"},
{img:"slide4.png",text:"...building careers that cross borders.",pos:"center center",size:"cover",bg:"#0a0a1a"},
];

return(
<div style={{position:"fixed",top:0,left:0,width:"100%",height:"100%",background:"#0a0a1a",zIndex:9999,opacity:out?0:1,transition:"opacity .6s ease"}}>

{slides.map(function(sl,i){return(
<div key={i} style={{position:"absolute",top:0,left:0,width:"100%",height:"100%",opacity:scene===i?1:0,transition:"opacity 1s ease",backgroundImage:"url("+sl.img+")",backgroundSize:sl.size,backgroundPosition:sl.pos,backgroundRepeat:"no-repeat",backgroundColor:sl.bg}}/>
)})}

<div style={{position:"absolute",top:0,left:0,width:"100%",height:"100%",background:"linear-gradient(to bottom, rgba(10,10,26,.55) 0%, rgba(10,10,26,.75) 100%)"}}>
<div style={{position:"absolute",bottom:"12%",left:0,width:"100%",textAlign:"center",padding:"0 30px"}}>

<div key={scene} style={{animation:"fadeUp .7s ease both"}}>
<div style={{fontFamily:"Georgia,serif",fontSize:scene===3?22:30,color:"#F8F6F1",letterSpacing:scene===3?.5:1,lineHeight:1.4,textShadow:"0 2px 20px rgba(0,0,0,.5)"}}>
{slides[Math.min(scene,3)].text}
</div>
</div>

{scene>=4&&(
<button onClick={finish} style={{marginTop:24,padding:"14px 44px",background:"#8B7355",color:"#F8F6F1",border:"none",borderRadius:8,fontSize:16,fontFamily:"Georgia,serif",letterSpacing:1,cursor:"pointer",animation:"fadeUp .6s ease .2s both",opacity:0,boxShadow:"0 4px 20px rgba(139,115,85,.4)"}}>
Begin Training
</button>
)}

<div style={{display:"flex",justifyContent:"center",gap:8,marginTop:20}}>
{[0,1,2,3].map(function(i){return(
<div key={i} style={{width:scene===i?28:8,height:6,borderRadius:3,background:scene>=i?"#8B7355":"rgba(248,246,241,.15)",transition:"all .4s ease"}}/>
)})}
</div>

<div style={{marginTop:16}}>
<div style={{fontFamily:"Georgia,serif",fontSize:12,letterSpacing:4,color:"rgba(248,246,241,.4)"}}>
DESTA WORKS
</div>
</div>

</div>
</div>

<button onClick={finish} style={{position:"absolute",top:24,right:24,background:"transparent",border:"1px solid rgba(248,246,241,.2)",color:"rgba(248,246,241,.5)",padding:"6px 18px",borderRadius:20,fontSize:12,cursor:"pointer",zIndex:1}}>
Skip →
</button>
</div>
);
}

/* ========== APP ========== */
function App(){
const[view,setView]=useState("home");const[scores,setScores]=useState({});
const[name,setName]=useState("");const[nameSet,setNameSet]=useState(false);
const[visited,setVisited]=useState({});
const[showIntro,setShowIntro]=useState(true);

if(showIntro)return <Intro onDone={()=>setShowIntro(false)}/>;

const handleComplete=(mod,s,t)=>{setScores(p=>({...p,[mod]:{s,t}}));setView("home");window.scrollTo(0,0)};
const goTo=function(key){setVisited(function(p){var n=Object.assign({},p);n[key]=true;return n});setView(key);window.scrollTo(0,0)};
const modules=[
{key:"m1",num:"1",title:"Healthcare Knowledge",desc:"Licenses, client matching, fill-in-the-blanks",color:C.purple,day:"Day 1",pass:80,ex:"3 exercises",Comp:M1},
{key:"m2",num:"2",title:"ATS Simulator",desc:"Real statuses, new candidate entry, error detection",color:C.blue,day:"Day 2",pass:80,ex:"3 exercises",Comp:M2},
{key:"m3",num:"3",title:"Resume Conversion Lab",desc:"The one rule: can you change this or not?",color:C.green,day:"Day 3",pass:80,ex:"2 exercises",Comp:M3},
{key:"m4",num:"4",title:"Sourcing Simulator",desc:"Boolean search and license verification",color:C.orange,day:"Day 4",pass:80,ex:"2 exercises",Comp:M4},
{key:"m5",num:"5",title:"Outreach Simulator",desc:"Email drafts and red flag triage",color:C.red,day:"Day 5",pass:80,ex:"2 exercises",Comp:M5},
{key:"m6",num:"6",title:"Candidate Evaluation Scenarios",desc:"4 simulations: pipeline, red flags, triage, mistake recovery",color:C.charcoal,day:"Day 5",pass:80,ex:"4 scenarios",Comp:M6},
];
const allDone=modules.every(m=>scores[m.key]);
return(<div>
{modules.map(m=>{if(!visited[m.key])return null;var Comp=m.Comp;
return(<div key={m.key} style={{display:view===m.key?"block":"none",maxWidth:800,margin:"0 auto",padding:"20px 24px"}}>
<Header onHome={()=>{setView("home");window.scrollTo(0,0)}} showBack={true}/>
<div style={{display:"flex",alignItems:"center",gap:12,marginBottom:24}}>
<Badge text={"MODULE "+m.num} color={m.color}/><span style={{fontSize:20,fontWeight:600}}>{m.title}</span></div>
<Comp onComplete={(s,t)=>handleComplete(m.key,s,t)}/><Foot/></div>)})}
<div style={{display:view==="home"?"block":"none",maxWidth:800,margin:"0 auto",padding:"20px 24px"}}>
<Header onHome={()=>setView("home")}/>
<div style={{background:C.blue,borderRadius:8,padding:32,marginBottom:32,color:C.white}}>
<div style={{fontSize:12,letterSpacing:2,opacity:.7,marginBottom:8}}>DESTA WORKS \u2014 DESTA UNIVERSITY</div>
<div style={{fontSize:28,fontWeight:700,fontFamily:"Georgia,serif",marginBottom:8}}>Week 1 Training</div>
<div style={{fontSize:14,opacity:.8}}>Interactive modules for Associate Recruiters. Complete each module and meet the pass threshold.</div>
{!nameSet&&<div style={{marginTop:16,display:"flex",gap:8}}>
<input placeholder="Enter your name to begin..." value={name} onChange={e=>setName(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&name.trim())setNameSet(true)}}
style={{flex:1,padding:"8px 12px",borderRadius:4,border:"none",fontSize:14,color:C.charcoal}}/>
<button onClick={()=>{if(name.trim())setNameSet(true)}} style={{padding:"8px 20px",borderRadius:4,background:C.bronze,color:C.white,fontSize:14,fontWeight:600,opacity:name.trim()?1:.4}}>Begin</button></div>}
{nameSet&&<div style={{marginTop:12,fontSize:14,opacity:.9}}>Welcome, {name}.</div>}</div>
{modules.map(m=>{const d=!!scores[m.key];const p=d?Math.round(scores[m.key].s/scores[m.key].t*100):null;return(
<div key={m.key} onClick={()=>!d&&goTo(m.key)} style={{background:C.white,border:"1px solid "+(d?C.green:C.grayLt),borderLeft:"4px solid "+(d?C.green:m.color),borderRadius:8,padding:20,marginBottom:12,cursor:d?"default":"pointer"}}>
<div style={{display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
<div><div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}>
<Badge text={"M"+m.num} color={d?C.green:m.color}/><span style={{fontSize:18,fontWeight:600}}>{m.title}</span></div>
<div style={{fontSize:13,color:C.gray}}>{m.desc}</div></div>
<div style={{textAlign:"right"}}>{d?<div><div style={{fontSize:24,fontWeight:700,color:p>=m.pass?C.green:C.red}}>{p}%</div><div style={{fontSize:11,color:C.gray}}>{scores[m.key].s}/{scores[m.key].t} pts</div></div>
:<div><div style={{fontSize:12,color:m.color,fontWeight:600}}>{m.day}</div><div style={{fontSize:11,color:C.gray}}>{m.ex} \u2014 Pass: {"\u2265"}{m.pass}%</div></div>}</div>
</div>{d&&<PBar current={p} total={100}/>}</div>)})}
{allDone&&(<div style={{background:C.ivory,border:"2px solid "+C.bronze,borderRadius:8,padding:24,marginTop:24,textAlign:"center"}}>
<div style={{fontFamily:"Georgia,serif",fontSize:20,marginBottom:8}}>Week 1 Training Complete</div>
<div style={{fontSize:14,color:C.gray,marginBottom:16}}>{name&&<span>{name} \u2014 </span>}
Combined: {modules.reduce((s,m)=>s+(scores[m.key]?.s||0),0)} / {modules.reduce((s,m)=>s+(scores[m.key]?.t||0),0)} points</div>
<Btn variant="bronze" onClick={()=>{
const data={name,date:new Date().toISOString().split('T')[0],modules:Object.fromEntries(modules.map(m=>[m.key,{title:m.title,score:scores[m.key]?.s,total:scores[m.key]?.t,pct:Math.round((scores[m.key]?.s||0)/(scores[m.key]?.t||1)*100)}]))};
const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="desta-training-"+name.replace(/\s+/g,'-').toLowerCase()+"-"+data.date+".json";a.click();
}}>Download Results</Btn></div>)}
<Foot/></div></div>);
}
ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
